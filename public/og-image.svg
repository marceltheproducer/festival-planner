<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a12"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grad)" opacity="0.5"/>
  <defs>
    <radialGradient id="grad" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#e8a840" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0a12" stop-opacity="0"/>
