  <text x="100" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#9999aa">Browse festivals. Track deadlines. Build your submission strategy.</text>
  <rect x="100" y="440" width="200" height="4" rx="2" fill="#e8a840" opacity="0.5"/>
